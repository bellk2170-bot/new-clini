<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도매 판매현황 지도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3150;
  --accent:#4f8ef7;--text:#e8eaf6;--text2:#8b90b8;
  --c1:#4f8ef7;--c2:#3ecf8e;--c3:#f5a623;--c4:#b57bee;
  --green:#3ecf8e;--red:#f55656;
  --font:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 헤더 */
.hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.logo{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;margin-right:2px}
.logo span{color:var(--text2);font-weight:400}
.upbtn{display:flex;align-items:center;gap:5px;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.upbtn:hover{opacity:.85}
#fi{display:none}
.sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.flabel{font-size:11px;color:var(--text2);white-space:nowrap}
.fg{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;line-height:1.4}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{font-weight:600}
.chip.p0.on{background:var(--c1);border-color:var(--c1);color:#fff}
.chip.p1.on{background:var(--c2);border-color:var(--c2);color:#111}
.chip.p2.on{background:var(--c3);border-color:var(--c3);color:#111}
.chip.p3.on{background:var(--c4);border-color:var(--c4);color:#fff}
.chip.rc.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.nc.on{background:var(--c3);border-color:var(--c3);color:#111}
/* 신규 개원 */
#new-btn.on{background:var(--c3);border-color:var(--c3);color:#111}
.nc-tag{font-size:10px;padding:1px 7px;border-radius:10px;background:var(--c3);color:#111;font-weight:600;flex-shrink:0}
.nc-date{font-size:10px;color:var(--c3);font-weight:600}
/* 백그라운드 좌표변환 진행 표시 */
.geo-bar{display:none;align-items:center;gap:7px;margin-left:auto;flex-shrink:0}
.geo-bar.show{display:flex}
.geo-txt{font-size:11px;color:var(--text2);white-space:nowrap}
.geo-prog{width:100px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.geo-fill{height:4px;background:var(--accent);border-radius:2px;transition:width .3s}
.stats{display:flex;gap:14px;margin-left:4px;flex-shrink:0}
.stat{text-align:right}
.stat-v{font-size:15px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text2)}

/* 메인 */
.main{display:flex;flex:1;overflow:hidden}

/* 사이드 */
.side{width:310px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);overflow:hidden}
.sh{padding:9px 13px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:7px}
.sh span{font-weight:600;white-space:nowrap}
.sh input{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:3px 8px;flex:1;min-width:0;outline:none}
.sort-btn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:11px;padding:3px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sort-btn.on{border-color:var(--accent);color:var(--accent)}
.sh input:focus{border-color:var(--accent)}
.pl{overflow-y:auto;flex:1}
.pi{padding:9px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.pi:hover,.pi.sel{background:var(--surface2)}
.pn{font-size:13px;font-weight:600;margin-bottom:2px}
.pa{font-size:11px;color:var(--text2);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:2px}
.pa-addr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.pa-pharm{color:var(--acc);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.ptag{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600}
.t0{background:rgba(79,142,247,.18);color:var(--c1)}
.t1{background:rgba(62,207,142,.18);color:var(--c2)}
.t2{background:rgba(245,166,35,.18);color:var(--c3)}
.t3{background:rgba(181,123,238,.18);color:var(--c4)}
.pt{font-size:11px;color:var(--text2)}

/* 지도 */
.mwrap{position:relative;flex:1;overflow:hidden}
#map{width:100%;height:100%}

/* 팝업 */
.popup{position:absolute;right:14px;top:14px;width:285px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;z-index:1000;display:none;box-shadow:0 8px 32px rgba(0,0,0,.55);max-height:calc(100vh - 110px);overflow-y:auto}
.popup.show{display:block}
.pname{font-size:14px;font-weight:700;margin-bottom:2px;padding-right:20px}
.porig{font-size:10px;color:var(--text2);margin-bottom:2px}
.paddr-txt{font-size:11px;color:var(--text2);margin-bottom:10px}
.psec{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin:10px 0 5px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border:none}
.ppn{font-size:12px}
.pamt{font-size:12px;font-weight:700}
.pqty{font-size:10px;color:var(--text2);font-weight:400}
.closebtn{position:absolute;top:11px;right:11px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px}

/* 건물탭 */
.btabs{display:flex;gap:0;margin:10px 0 7px;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.btab{flex:1;padding:5px 0;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .12s;background:var(--surface2);color:var(--text2)}
.btab.on{background:var(--accent);color:#fff}
.cli{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:4px}
.cli:last-child{border:none}
.cli-name{flex:1;min-width:0}
.cli-type{font-size:10px;color:var(--c4);margin-left:4px}
.cli-dist{font-size:10px;color:var(--text2);white-space:nowrap}
.same-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(79,142,247,.2);color:var(--accent);margin-left:4px;white-space:nowrap}
.cli-empty{font-size:12px;color:var(--text2);padding:6px 0}

/* 드래그 / 로딩 */
.dov{position:fixed;inset:0;background:rgba(79,142,247,.12);border:3px dashed var(--accent);z-index:100;display:none;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent)}
.dov.show{display:flex}
.loading{position:fixed;inset:0;background:rgba(15,17,23,.9);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-size:13px;color:var(--text)}
.loading.show{display:flex}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prog{width:220px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-bar{height:4px;background:var(--accent);border-radius:2px;transition:width .3s}
.lsub{font-size:11px;color:var(--text2)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2);font-size:13px;text-align:center;padding:24px}
.eico{font-size:34px}

/* 지역 드롭다운 패널 */
.reg-wrap{position:relative;display:flex;align-items:center;gap:4px}
.reg-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s}
.reg-btn:hover,.reg-btn.open{border-color:var(--accent);color:var(--accent)}
.reg-btn .cnt{font-size:10px;background:var(--accent);color:#fff;border-radius:10px;padding:1px 5px;margin-left:2px}
.reg-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:1500;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);padding:10px;display:none;min-width:220px}
.reg-panel.show{display:block}
.reg-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.reg-panel-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.3px}
.reg-panel-btns{display:flex;gap:4px}
.reg-panel-btns button{font-size:10px;padding:2px 7px;border-radius:5px;border:none;cursor:pointer;font-weight:600}
.rball{background:rgba(62,207,142,.2);color:var(--green)}
.rbnone{background:rgba(245,86,86,.2);color:var(--red)}
.reg-col-wrap{display:flex;gap:10px}
.reg-col{flex:1;min-width:0}
.reg-col-title{font-size:10px;font-weight:700;color:var(--text2);padding:3px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px;display:flex;justify-content:space-between}
.reg-col-title span{cursor:pointer;color:var(--accent);font-size:9px}
.reg-scroll{max-height:200px;overflow-y:auto}

/* 클릭 이슈 해결 */
.ritem{display:flex;align-items:center;gap:5px;padding:4px;cursor:pointer;border-radius:4px;transition:background .1s; pointer-events:auto;}
.ritem:hover{background:var(--surface2)}
.ritem * {pointer-events:none;} /* 하위 요소 개별 클릭 방지 */
.ritem input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0;}
.ritem span{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="dov" id="dov">📂 ZIP 파일을 여기에 놓으세요</div>
<div class="loading" id="ld">
  <div class="spinner"></div>
  <span id="lmsg">분석 중...</span>
  <div class="prog"><div class="prog-bar" id="pbar" style="width:0%"></div></div>
  <span class="lsub" id="lsub"></span>
</div>

<div class="hdr">
  <div class="logo">도매 판매현황 <span>지도</span></div>
  <input type="file" id="fi" accept=".zip,.xlsx,.xls,.csv" multiple>
  <button class="upbtn" onclick="document.getElementById('fi').click()">📂 파일 업로드</button>
  <div class="sep"></div>
  <span class="flabel">품목</span>
  <div class="fg" id="pf"></div>
  <div class="sep"></div>
  <div class="reg-wrap" id="reg-wrap">
    <button class="reg-btn" id="reg-btn" onclick="toggleRegPanel()">
      🗺 지역 선택 <span class="cnt" id="reg-cnt">0</span>
    </button>
    <div class="reg-panel" id="reg-panel">
      <div class="reg-panel-hdr">
        <span class="reg-panel-title">지역 선택</span>
        <div class="reg-panel-btns">
          <button class="rball" onclick="selAll()">전체선택</button>
          <button class="rbnone" onclick="selNone()">전체해제</button>
        </div>
      </div>
      <div class="reg-col-wrap">
        <div class="reg-col" style="min-width:90px">
          <div class="reg-col-title">도·특별시</div>
          <div class="reg-scroll" id="rf-do"></div>
        </div>
        <div class="reg-col" style="min-width:90px">
          <div class="reg-col-title" id="rf-si-title">시·군</div>
          <div class="reg-scroll" id="rf-si"></div>
        </div>
        <div class="reg-col" style="min-width:90px">
          <div class="reg-col-title">구</div>
          <div class="reg-scroll" id="rf-gu"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="reg-wrap" id="new-wrap">
    <button class="reg-btn" id="new-btn" onclick="toggleNewMode()">🆕 신규 개원 <span class="cnt" id="new-cnt">0</span></button>
    <div class="reg-panel" id="new-panel" style="min-width:260px">
      <div class="reg-panel-hdr"><span class="reg-panel-title">신규 개원 필터</span></div>
      <div style="padding:9px 11px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:5px">종별</div>
        <div class="fg" id="new-kinds"></div>
        <div style="font-size:11px;color:var(--text2);margin:10px 0 5px">기간 (기준일 <span id="new-base" style="color:var(--text)">-</span> 이전)</div>
        <div class="fg" id="new-period"></div>
        <div style="font-size:11px;color:var(--text2);margin:10px 0 5px">지역</div>
        <div class="fg" id="new-sido"></div>
        <div class="fg" id="new-sigu" style="margin-top:4px"></div>
      </div>
    </div>
  </div>
  <div class="geo-bar" id="geo-bar">
    <span class="geo-txt" id="geo-txt">좌표 변환 중...</span>
    <div class="geo-prog"><div class="geo-fill" id="geo-fill" style="width:0%"></div></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-v" id="sv-p">0</div><div class="stat-l">거래처</div></div>
    <div class="stat"><div class="stat-v" id="sv-a">-</div><div class="stat-l">총매출</div></div>
  </div>
  <button class="upbtn" style="margin-left:auto;background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="window.open('https://search-ykiho.vercel.app/','_blank','noopener')">🔍 요양기관 조회</button>
</div>

<div class="main">
  <div class="side">
    <div class="sh">
      <span id="lcnt">거래처 목록</span>
      <input id="srch" placeholder="검색..." oninput="renderList()">
      <button class="sort-btn" id="sort-btn" onclick="toggleSort()">금액↕</button>
    </div>
    <div class="pl" id="pl">
      <div class="empty"><div class="eico">📦</div><div>ZIP 또는 엑셀 파일을 업로드하면<br>자동으로 분석합니다</div></div>
    </div>
  </div>
  <div class="mwrap">
    <div id="map"></div>
    <div class="popup" id="popup">
      <button class="closebtn" onclick="closePopup()">✕</button>
      <div class="pname" id="pp-n"></div>
      <div class="porig" id="pp-o"></div>
      <div class="paddr-txt" id="pp-a"></div>
      <div class="psec">품목별 매출</div>
      <div id="pp-p"></div>
      <div id="bld-section" style="display:none">
        <div class="btabs">
          <button class="btab on" id="tab-same" onclick="switchTab('same')">🏢 같은 건물</button>
          <button class="btab" id="tab-pharm" onclick="switchTab('pharm')">💊 약국</button>
          <button class="btab" id="tab-near" onclick="switchTab('near')">📍 근처 의원</button>
        </div>
        <div id="pp-same"></div>
        <div id="pp-pharm" style="display:none"></div>
        <div id="pp-near" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script>
const KAKAO_KEY='2bb9925b17de43f8883914bedc4eefdb';
const KAKAO_REST='4af93da930b663c45ea66c8b9e7820fb';
const NAVER_CLIENT_ID='bk2yj9j9jx';
const PRODS=['리피토정','리피토플러스정','카듀엣정','자큐보정'];
const PC=['#4f8ef7','#3ecf8e','#f5a623','#b57bee'];

// 병원명 자동 보정 사전
const CLINIC_FIX = {
  '장내과': '참내과',
  '연세월드힘': '연세웰드림',
  '워싱턴의원': '위드본의원'
};

const UNIT_PRICE={
  '리피토_10':638,'리피토_20':688,'리피토_40':1330,'리피토_80':1511,
  '리피토플러스_10_10':637,'리피토플러스_10_20':808,'리피토플러스_10_40':1413,
  '자큐보_일반':911,'자큐보_구강':911,
  '카듀엣_5_10':733,'카듀엣_5_20':903,'카듀엣_5_40':1233,'카듀엣_10_20':1098,
};

let allData=[], markers=[], gmap, gcache={};
let activeProd=new Set(); // 처음엔 전체 해제 상태로 시작
let activeReg={do:new Set(), si:new Set(), gu:new Set()};
let allRegs=new Set();

window._mapOn=true;
// 네이버맵 초기화
window.initMap=function(){
  gmap=new naver.maps.Map(document.getElementById('map'),{
    center:new naver.maps.LatLng(36.5,127.8),
    zoom:7,
    mapTypeControl:false,
    logoControl:true,
    scaleControl:false,
    mapDataControl:false,
    zoomControl:true,
    zoomControlOptions:{position:naver.maps.Position.RIGHT_CENTER},
  });
};


async function startGeocode(addrs){
  const uniqueAddrs=[...new Set(addrs.filter(Boolean))];
  const addrTotal=uniqueAddrs.length;
  if(addrTotal===0) return;
  const geoBar=document.getElementById('geo-bar');
  const geoTxt=document.getElementById('geo-txt');
  const geoFill=document.getElementById('geo-fill');
  geoBar.classList.add('show');
  const BATCH=8;
  for(let i=0;i<uniqueAddrs.length;i+=BATCH){
    if(!window._mapOn) break;
    const batch=uniqueAddrs.slice(i,i+BATCH);
    const pct=Math.round((i/addrTotal)*100);
    geoTxt.textContent=`📍 좌표 변환 ${Math.min(i+BATCH,addrTotal)}/${addrTotal}`;
    geoFill.style.width=pct+'%';
    await Promise.all(batch.map(addr=>geocodeOne(addr)));
    // gcache 결과를 allData에 반영 (lat 있든 없든 매번 갱신)
    for(let j=0;j<allData.length;j++){
      const cached=gcache[allData[j].addr];
      if(cached){ allData[j].lat=cached.lat; allData[j].lng=cached.lng; }
    }
    renderMap();
    renderList(); // 목록의 🔴좌표없음 뱃지도 실시간 갱신
    await sleep(120);
  }
  geoFill.style.width='100%';
  geoTxt.textContent='✅ 좌표 변환 완료';
  await sleep(1500);
  geoBar.classList.remove('show');
  renderMap();
  renderList(); // 최종 목록 갱신
}

document.getElementById('fi').addEventListener('change',e=>{handleFiles(e.target.files);e.target.value='';});
document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dov').classList.add('show')});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('dov').classList.remove('show')});
document.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dov').classList.remove('show');handleFiles(e.dataTransfer.files)});

async function handleFiles(files){
  showLoad('파일 읽는 중...',0);
  const rows=[];
  const fileArr=Array.from(files);

  // 1단계: ZIP과 엑셀 분리
  const zipFiles=fileArr.filter(f=>f.name.toLowerCase().endsWith('.zip'));
  const xlsFiles=fileArr.filter(f=>/\.xlsx?$/i.test(f.name));
  const csvFiles=fileArr.filter(f=>/\.csv$/i.test(f.name));

  // 2단계: ZIP 처리 — 내부 엑셀을 한 파일씩 순차(스트리밍) 파싱
  // ※ xlsx 파일은 그 자체가 ZIP(압축) 포맷이라 원본 바이트를 평문 스캔해도
  //    '리피토' 같은 키워드가 절대 잡히지 않는다. 그래서 키워드 사전필터는 제거하고
  //    모든 엑셀을 parseXlsx로 넘긴다. (parseXlsx의 classify()가 관련 없는 행은 이미 걸러냄)
  //    파싱은 CPU 작업이라 병렬 로드 이점이 없어 메모리를 아끼는 순차 방식을 쓴다.
  //    ※ ZIP 안에 또 ZIP이 들어있어도(중첩 압축) 재귀로 끝까지 풀어서 처리한다.

  let done=0;
  const total=zipFiles.length+xlsFiles.length;
  const MAX_ZIP_DEPTH=8; // 무한 재귀 방지용 안전장치

  // ZIP 하나를 받아: 안의 엑셀은 파싱하고, 안의 ZIP은 또 풀어서 재귀 처리
  async function parseZipEntries(zipObj, label, depth, zi){
    const entries=Object.values(zipObj.files).filter(x=>!x.dir);
    const xls=entries.filter(x=>/\.xlsx?$/i.test(x.name));
    const nested=entries.filter(x=>/\.zip$/i.test(x.name));
    // (1) 이 단계의 엑셀 파싱 — 진행바를 파일 단위로 부드럽게 갱신 (예전 표시 방식)
    for(let i=0;i<xls.length;i++){
      showLoad(`분석 중: ${label} › ${xls[i].name}`,Math.round(((done+i/xls.length)/total)*40),`📦 ${zi+1}/${zipFiles.length}번째 ZIP`);
      try{
        const buf=await xls[i].async('arraybuffer');
        parseXlsx(buf,rows);
      }catch(e){ console.warn('파싱 오류:',xls[i].name,e); }
    }
    // (2) 중첩 ZIP을 풀어서 재귀 처리
    if(nested.length){
      if(depth>=MAX_ZIP_DEPTH){ console.warn('ZIP 중첩이 너무 깊어 건너뜀:',label); return; }
      for(const nz of nested){
        showLoad(`압축 해제 중: ${label} › ${nz.name}`,Math.round(((done+0.5)/total)*40),`🗜 중첩 ZIP`);
        try{
          const nbuf=await nz.async('arraybuffer');
          const nzip=await JSZip.loadAsync(nbuf);
          await parseZipEntries(nzip, `${label} › ${nz.name}`, depth+1, zi);
        }catch(e){ console.warn('중첩 ZIP 열기 오류:',nz.name,e); }
      }
    }
  }

  for(let zi=0;zi<zipFiles.length;zi++){
    const f=zipFiles[zi];
    showLoad(`ZIP 열기 중 (${zi+1}/${zipFiles.length}): ${f.name}`,Math.round((done/total)*40));
    try{
      const zip=await JSZip.loadAsync(f);
      await parseZipEntries(zip, f.name, 0, zi);
    }catch(e){ console.warn('ZIP 열기 오류:',f.name,e); }
    done++;
  }

  // 3단계: 단독 엑셀 처리
  for(let xi=0;xi<xlsFiles.length;xi++){
    const f=xlsFiles[xi];
    showLoad(`엑셀 분석 중 (${xi+1}/${xlsFiles.length}): ${f.name}`,Math.round((done/total)*40));
    try{
      const buf=await f.arrayBuffer();
      parseXlsx(buf,rows);
    }catch(e){ console.warn('엑셀 파싱 오류:',f.name,e); }
    done++;
  }

  // 4단계: CSV 처리 (심평원 요양기관 개설현황 = 신규 개원 데이터)
  let hiraLoaded=false;
  for(const f of csvFiles){
    showLoad(`개원현황 읽는 중: ${f.name}`,42);
    try{
      const text=decodeKR(await f.arrayBuffer());
      if(isHiraCsv(text)){ parseHiraCsv(text); hiraLoaded=true; }
      else { console.warn('개설현황 형식이 아닌 CSV:', f.name); }
    }catch(e){ console.warn('CSV 처리 오류:', f.name, e); }
  }
  if(hiraLoaded) onHiraLoaded();

  if(rows.length===0){ hideLoad(); return; }

  showLoad('데이터 집계 중...',45);
  await sleep(50);
  await buildData(rows);
}

function parseXlsx(buf,out){
  try{
    const wb=XLSX.read(buf,{type:'array'});
    for(const sn of wb.SheetNames){
      const ws=wb.Sheets[sn];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2) continue;
      const H=rows[0].map(h=>String(h).replace(/\s+/g,''));
      const fc=(...c)=>{for(const x of c){const i=H.findIndex(h=>h.includes(x));if(i>=0)return i;}return -1;};
      const pc=fc('PRODUCT','제품명','품목명','품명');
      const qc=fc('수량');
      const tc=fc('TARGET','거래처명','입고처명','매입처명','입고처','발주처');
      const dc=fc('주소','소재지','기본주소');
      const sc=fc('규격'); // 규격 컬럼 (통당 정수 파싱용)
      // 약국(거래처) 사업자등록번호 컬럼 — 공급자/제약사 컬럼은 제외
      let bc=fc('거래처사업자','매출처사업자','실납처사업자','구입사업자','공급받은자사업자');
      if(bc<0) bc=H.findIndex(h=>/사업자(등록)?번호/.test(h) && !/공급자|제약|도매|본사/.test(h));
      
      if(pc<0) continue;
      for(let ri=1;ri<rows.length;ri++){
        const r=rows[ri];
        const p=String(r[pc]||'').trim();
        if(!p) continue;
        const det=classify(p);
        if(!det) continue;
        
        let tgt=String(r[tc>=0?tc:0]||'').trim();
        // 자동 교정 적용
        for(const [bad, good] of Object.entries(CLINIC_FIX)){
          if(tgt.includes(bad)) tgt = tgt.replace(bad, good);
        }
        
        const addr=String(r[dc>=0?dc:0]||'').trim();
        if(!tgt&&!addr) continue;
        
        const qty=qc>=0?parseFloat(String(r[qc]||'0').replace(/,/g,''))||0:0;
        const spec=sc>=0?String(r[sc]||'').trim():'';
        const tabs=getTabsPer(spec)||getTabsPer(p); // 규격 우선, 없으면 제품명
        const amt=qty*tabs*(UNIT_PRICE[det.key]||0);
        const bizRaw=bc>=0?String(r[bc]||'').replace(/\D/g,''):'';
        const biz=bizRaw.length===10?bizRaw:'';
        out.push({tgt,addr,cat:det.cat,qty:qty*tabs,amt,biz});
      }
    }
  }catch(e){ console.warn("parseXlsx 오류:", e); }
}

function getTabsPer(p){
  if(!p) return 0;
  // 1순위: 슬래시 뒤 숫자+단위 (10mg/90T, 20mg/300정, 10/10/30T 등)
  let m=p.match(/\/\s*(\d+)\s*(?:tabs?|정|T|t)(?:\b|\(|$)/);
  if(m) return parseInt(m[1]);
  // 2순위: 숫자+단위 (28T, 90정, 300tab, 28 정, 300 정 등)
  m=p.match(/(\d+)\s*(?:tabs?|정|T|t)(?:\b|\(|\s|$)/);
  if(m) return parseInt(m[1]);
  // 3순위: 숫자만 (단위 생략: '28', '90', '300')
  m=p.match(/^(\d+)$/);
  if(m){ const n=parseInt(m[1]); if([28,30,90,300].includes(n)) return n; }
  return 0;
}

function classify(p){
  if(/카듀엣|CADUET/i.test(p)){
    if(/10[\/\s]*20/i.test(p))return{cat:'카듀엣정',key:'카듀엣_10_20'};
    if(/5[\/\s]*40/i.test(p)) return{cat:'카듀엣정',key:'카듀엣_5_40'};
    if(/5[\/\s]*20/i.test(p)) return{cat:'카듀엣정',key:'카듀엣_5_20'};
    return{cat:'카듀엣정',key:'카듀엣_5_10'};
  }
  if(/자큐보/i.test(p)){
    if(/구강|ODT/i.test(p))return{cat:'자큐보정',key:'자큐보_구강'};
    return{cat:'자큐보정',key:'자큐보_일반'};
  }
  if(/리피토플러스|리피토\s*플러스|LIPITOR\s*PLUS/i.test(p)){
    if(/10[\/\s]*40/i.test(p))return{cat:'리피토플러스정',key:'리피토플러스_10_40'};
    if(/10[\/\s]*20/i.test(p))return{cat:'리피토플러스정',key:'리피토플러스_10_20'};
    return{cat:'리피토플러스정',key:'리피토플러스_10_10'};
  }
  if(/리피토|LIPITOR/i.test(p)){
    // 용량은 'mg' 숫자로만 판정 — 정수(예: 140정)나 다른 숫자를 용량으로 오인하지 않도록
    const mg=(p.match(/(\d+)\s*mg/i)||[])[1];
    if(mg==='80')return{cat:'리피토정',key:'리피토_80'};
    if(mg==='40')return{cat:'리피토정',key:'리피토_40'};
    if(mg==='20')return{cat:'리피토정',key:'리피토_20'};
    if(mg==='10')return{cat:'리피토정',key:'리피토_10'};
    // mg 표기가 없으면 기본 10mg
    return{cat:'리피토정',key:'리피토_10'};
  }
  return null;
}

// 시·도명(정식명·약칭·'서울시'형)을 인식해 약칭으로 정규화하고, 떼어낸 나머지를 반환.
// 예) "경상북도 포항시.." → {sido:'경북', rest:'포항시..'}, "서울시 송파.." → {sido:'서울', rest:'송파..'}
// ※ '광주시'는 경기도 광주시일 수 있어 시도로 보지 않고 흘려보낸다(이후 시/군 추론에서 처리).
function detectSido(s){
  const T=[
    ['서울특별시','서울'],['부산광역시','부산'],['대구광역시','대구'],['인천광역시','인천'],
    ['광주광역시','광주'],['대전광역시','대전'],['울산광역시','울산'],['세종특별자치시','세종'],
    ['강원특별자치도','강원'],['전북특별자치도','전북'],['제주특별자치도','제주'],['제주특별시','제주'],
    ['경기도','경기'],['강원도','강원'],['충청북도','충북'],['충청남도','충남'],
    ['전라북도','전북'],['전라남도','전남'],['경상북도','경북'],['경상남도','경남'],['제주도','제주'],
    ['부산광역','부산'],['대구광역','대구'],['인천광역','인천'],['광주광역','광주'],['대전광역','대전'],
    ['울산광역','울산'],['제주특별','제주'],['강원특별','강원'],['전북특별','전북'],
    ['서울시','서울'],['부산시','부산'],['대구시','대구'],['인천시','인천'],
    ['대전시','대전'],['울산시','울산'],['세종시','세종'],
    ['서울','서울'],['부산','부산'],['대구','대구'],['인천','인천'],['광주','광주'],['대전','대전'],
    ['울산','울산'],['세종','세종'],['경기','경기'],['강원','강원'],['충북','충북'],['충남','충남'],
    ['전북','전북'],['전남','전남'],['경북','경북'],['경남','경남'],['제주','제주']
  ].sort((a,b)=>b[0].length-a[0].length); // 긴 이름 우선 매칭
  // 선두의 괄호 보조표기/공백 제거 ("(지족동) 대전 ..." → "대전 ..")
  let t=(s||'').replace(/^\s+/,'').replace(/^\([^)]*\)\s*/,'').replace(/^\s+/,'');
  for(const [full,ab] of T){
    if(t.startsWith(full)){
      const after=t.slice(full.length);
      if(after===''||/^[\s,]/.test(after)) return {sido:ab, rest:after.replace(/^[\s,]+/,'')};
    }
  }
  return {sido:null, rest:t};
}

function extractRegion(addr){
  if(!addr) return {do:null,si:null,gu:null};
  let dName=null, sName=null, gName=null;

  const det=detectSido(addr);
  dName=det.sido;
  const rest=det.rest;

  // 시·도를 떼어낸 나머지에서 시/군/구 추출.
  // ※ 시/군은 '맨 앞'에서만(앵커) 추출해야 '...상업시설'의 '시' 등을 오인하지 않음.
  const siMatch = rest.match(/^\s*([가-힣]+(?:시|군))(?!도)/);
  if(siMatch) sName = siMatch[1];

  const guMatch = rest.match(/([가-힣]+구)/);
  if(guMatch) gName = guMatch[1];

  // 주소에서 '경기도'가 생략된 경우 자동 추론 보정
  if(!dName && sName){
    const s = sName.replace(/[시군]$/,'');
    if(['수원','성남','안양','부천','광명','평택','동두천','안산','고양','과천','구리','남양주','오산','시흥','군포','의왕','하남','용인','파주','이천','안성','김포','화성','광주','양주','포천','여주','연천','가평','양평'].includes(s)) dName='경기';
    else if(['제주','서귀포'].includes(s)) dName='제주';
  }
  if(!dName && gName){
    const g = gName.replace(/구$/,'');
    if(['강남','강동','강북','강서','관악','광진','구로','금천','노원','도봉','동대문','동작','마포','서대문','서초','성동','성북','송파','양천','영등포','용산','은평','종로','중','중랑'].includes(g)) dName='서울';
    else if(['계양','미추홀','남동','동','부평','서','연수','중'].includes(g) && !sName) dName='인천';
  }

  // 매칭 안 되는 경우도 필터에서 배제되지 않도록 '기타' 할당
  return {do: dName||'기타', si: sName||'', gu: gName||''};
}

// 주소에서 시/군/구 접두어 추출 (병합 키 충돌 방지용)
// ※ 같은 장소가 "경기 성남시 …", "경기도 성남시 …", "성남시 …" 처럼
//   시·도가 있거나/없거나 다르게 적혀도 동일한 prefix를 갖도록 정규화한다.
//   (기존 버전은 "경기도"의 끝글자 '도'가 prefix에 새어들어가 '도성남시분당구'가 되는 버그가 있었음)
function addrPrefix(s){
  const SIDO_FULL={'서울':'서울특별시','부산':'부산광역시','대구':'대구광역시','인천':'인천광역시','광주':'광주광역시','대전':'대전광역시','울산':'울산광역시','세종':'세종특별자치시','경기':'경기도','강원':'강원도','충북':'충청북도','충남':'충청남도','전북':'전라북도','전남':'전라남도','경북':'경상북도','경남':'경상남도','제주':'제주특별자치도'};
  // 시도 생략 시 시/군·구로 추론 (extractRegion과 동일 규칙)
  const GG=['수원','성남','안양','부천','광명','평택','동두천','안산','고양','과천','구리','남양주','오산','시흥','군포','의왕','하남','용인','파주','이천','안성','김포','화성','광주','양주','포천','여주','연천','가평','양평'];
  const SEOUL_GU=['강남','강동','강북','강서','관악','광진','구로','금천','노원','도봉','동대문','동작','마포','서대문','서초','성동','성북','송파','양천','영등포','용산','은평','종로','중','중랑'];
  const INCHEON_GU=['계양','미추홀','남동','부평','연수']; // 이름 중복 많은 동/서/중구는 제외(오병합 방지)

  // 1) 시·도명 분리 (정식명·약칭·'서울시'형 모두 인식, 약칭으로 정규화)
  const det=detectSido(s);
  let sido=det.sido, rest=det.rest;
  // 2) 시군구는 나머지 '맨 앞'에서만 추출 (본문 단어의 '시'/'구' 오인 방지)
  let si=null, gu=null;
  const mg=rest.match(/^\s*([가-힣]+[시군])(?:\s+([가-힣]+구))?/);
  if(mg){ si=mg[1]; gu=mg[2]||null; }
  else { const mg2=rest.match(/^\s*([가-힣]+구)/); if(mg2) gu=mg2[1]; }
  // 3) 시도 생략된 경우 추론
  if(!sido && si){
    const b=si.replace(/[시군]$/,'');
    if(GG.includes(b)) sido='경기';
    else if(['제주','서귀포'].includes(b)) sido='제주';
  }
  if(!sido && gu){
    const g=gu.replace(/구$/,'');
    if(SEOUL_GU.includes(g)) sido='서울';
    else if(INCHEON_GU.includes(g)) sido='인천';
  }
  const sidoFull=sido?SIDO_FULL[sido]:'';
  return (sidoFull+(si||'')+(gu||'')).replace(/\s/g,'');
}

// 도로명+건물번호(또는 동+번지) 핵심부 추출
// ※ "두류공원로17길 16"처럼 숫자+길(가길/번길 포함) 뒤의 숫자가 진짜 건물번호.
//    "분당로 50"처럼 길이 없으면 로/대로 뒤 숫자가 건물번호.
function addrCore(s){
  // 도로명: XX로/대로 (+ 선택적 NN길/NN가길/NN번길) + 건물번호
  const m=s.match(/((?:[가-힣A-Za-z0-9]+)(?:대로|로))(?:\s*(\d+(?:가|번)?길))?\s*[, ]?\s*(\d+(?:-\d+)?)/);
  if(m){
    const road=m[1]+(m[2]||'');
    return (road+m[3]).replace(/\s/g,'');
  }
  // 지번주소: 동/리/가 + 번지
  const m2=s.match(/([가-힣]+(?:동|리|가))\s*(\d+(?:-\d+)?)/);
  if(m2) return (m2[1]+m2[2]).replace(/\s/g,'');
  return null;
}

// 같은 건물 병합용 정규화 키
// - 호수 없거나 한쪽만 있으면: 도로명+건물번호만으로 키 → 합산
// - 둘 다 호수 있고 다를 때만: 호수까지 키에 포함 → 분리 유지
// ※ normalizeAddr는 단독 주소에서 키를 만들므로,
//   "둘 다 있을 때" 판단은 buildData에서 비교 후 처리
// 층수 제거: 'N층'이 건물번호에 붙어("715 1층"↔"7151층") 키가 갈리는 것을 방지
function stripFloor(s){
  return s.replace(/지하\s*\d*\s*층/g,' ')      // 지하층 / 지하1층
          .replace(/(\d)\s+\d+\s*층/g,'$1')      // "건물152 12층" → "152" (건물번호+공백+층)
          .replace(/(\d)\d\s*층/g,'$1')           // "7151층"→"715", "101층"→"10" (붙은 한자리 층)
          .replace(/\s+/g,' ').trim();
}
function normalizeAddr(a, stripHo){
  if(!a) return '';
  let s=a.replace(/\([^)]*\)/g,' ').replace(/@/g,' ');
  s=s.replace(/[가-힣A-Za-z0-9-]*외\s*\d+\s*필지/g,' ');
  s=stripFloor(s);
  s=s.replace(/\s+/g,' ').trim();
  const prefix=addrPrefix(s), core=addrCore(s);
  if(!stripHo){
    const hoM=s.match(/(\d+(?:[~\-]\d+)?)\s*호(?:\s|$|,)/);
    const ho=hoM?hoM[1]:'';
    if(core) return prefix+'|'+core+(ho?'|'+ho:'');
  } else {
    if(core) return prefix+'|'+core;
  }
  return s.replace(/\s/g,'');
}
// 호수 추출 헬퍼
function extractHo(a){
  const m=(a||'').replace(/\([^)]*\)/g,' ').match(/(\d+(?:[~\-]\d+)?)\s*호(?:\s|$|,)/);
  return m?m[1]:'';
}

// 지오코딩 정확도용: 도로명+건물번호까지만 깔끔히 남긴 주소 문자열
// (괄호·층/호·상가명 등 잡음을 제거해 네이버 지오코더 적중률을 높임)
function cleanAddrForGeocode(a){
  if(!a) return a;
  let s=a;
  s=s.replace(/\([^)]*\)/g,' ').replace(/@/g,' ');
  s=s.replace(/[가-힣A-Za-z0-9-]*외\s*\d+\s*필지/g,' ');
  s=s.replace(/\s+/g,' ').trim();
  // 시도 + 시군구 + 도로명 + 건물번호 까지만 잘라서 반환
  const m=s.match(/^(.*?(?:대로|로)(?:\s*\d+(?:가|번)?길)?\s*\d+(?:-\d+)?)/);
  if(m) return m[1].replace(/\s+/g,' ').trim();
  // 도로명 매칭 실패 시 동+번지까지
  const m2=s.match(/^(.*?[가-힣]+(?:동|리|가)\s*\d+(?:-\d+)?)/);
  if(m2) return m2[1].replace(/\s+/g,' ').trim();
  return s;
}

async function buildData(rows){
  // 0단계: 사업자번호 신뢰성 가드
  //  - 한 번호에 거래처명이 5개 초과(공급자/플레이스홀더 의심)
  //  - 한 번호가 서로 다른 '정밀 건물' 5곳 초과(도매 배송번호 등) → 신뢰 안 함
  const bizNames={}, bizCores={};
  for(const r of rows){
    if(!r.biz) continue;
    const nm=(r.tgt||'').replace(/\s/g,'');
    if(nm){ (bizNames[r.biz]=bizNames[r.biz]||new Set()).add(nm); }
    if(r.addr && !isImpreciseAddr(r.addr)){
      const sig=(addrPrefix(r.addr)||'')+'|'+(addrCore(r.addr)||'');
      (bizCores[r.biz]=bizCores[r.biz]||new Set()).add(sig);
    }
  }
  const bizBad=new Set();
  for(const b in bizNames) if(bizNames[b].size>5) bizBad.add(b);
  for(const b in bizCores) if(bizCores[b].size>5) bizBad.add(b);
  const useBiz=(r)=> r.biz && !bizBad.has(r.biz);

  // 1단계: (사업자번호로 안 묶이는 행만) 호수 그룹핑 → 주소키 결정용
  const baseGroups={};
  for(const r of rows){
    if(useBiz(r)) continue;
    if(!r.addr||r.addr.trim().length<=3) continue;
    const bk=normalizeAddr(r.addr, true);
    if(!bk) continue;
    if(!baseGroups[bk]) baseGroups[bk]=new Set();
    const ho=extractHo(r.addr);
    if(ho) baseGroups[bk].add(ho);
  }

  // 2단계: 키 결정 + 누적 (사업자번호 우선, 없으면 주소)
  const mp={};
  for(const r of rows){
    let key, biz='';
    if(useBiz(r)){
      key='BIZ:'+r.biz; biz=r.biz;
    } else {
      if(!r.addr||r.addr.trim().length<=3) continue;
      const bk=normalizeAddr(r.addr, true);
      if(!bk) continue;
      const useHo=(baseGroups[bk]||new Set()).size>=2; // 2개 이상 다른 호수 → 분리
      key=normalizeAddr(r.addr, !useHo);
      if(!key) continue;
    }
    if(!mp[key]){
      mp[key]={orig:r.tgt||r.addr, nameSet:!!r.tgt, addr:r.addr||r.tgt, prods:{}, qtys:{}, biz};
    } else {
      // 표시 주소: 번지 있는(정밀) 주소 우선, 동급이면 더 짧은 것
      const cand=r.addr||r.tgt||'';
      if(cand){
        const curImp=isImpreciseAddr(mp[key].addr), candImp=isImpreciseAddr(cand);
        if((curImp && !candImp) || (curImp===candImp && cand.length < mp[key].addr.length))
          mp[key].addr=cand;
      }
      // 거래처명: 실제 거래처명이 한 번이라도 있으면 그것으로 채움
      if(r.tgt && !mp[key].nameSet){ mp[key].orig=r.tgt; mp[key].nameSet=true; }
    }
    mp[key].prods[r.cat]=(mp[key].prods[r.cat]||0)+r.amt;
    mp[key].qtys[r.cat]=(mp[key].qtys[r.cat]||0)+r.qty;
  }

  // 거래처명이 없던 항목: 이름을 (백필된) 정밀 주소로 채움 → '동까지만' 대신 전체주소 표시
  for(const k in mp){ if(!mp[k].nameSet) mp[k].orig=mp[k].addr; }

  // 같은 정밀주소면 합치기: 주소키 항목을 '동일 정밀주소의 유일한 사업자번호 항목'으로 흡수.
  // (서로 다른 사업자번호가 같은 주소를 공유하면 = 같은 건물 다른 약국 → 흡수하지 않음)
  const sigOf=(a)=> isImpreciseAddr(a) ? null : normalizeAddr(a, false);
  const bizBySig={}, sigConflict=new Set();
  for(const k in mp){ const e=mp[k]; if(!e.biz) continue; const s=sigOf(e.addr); if(!s) continue; if(bizBySig[s] && bizBySig[s]!==e) sigConflict.add(s); else bizBySig[s]=e; }
  for(const k in mp){
    const e=mp[k]; if(e.biz) continue;
    const s=sigOf(e.addr); if(!s) continue;
    const t=bizBySig[s];
    if(t && !sigConflict.has(s)){
      for(const p in e.prods) t.prods[p]=(t.prods[p]||0)+e.prods[p];
      for(const p in e.qtys) t.qtys[p]=(t.qtys[p]||0)+e.qtys[p];
      if(!t.nameSet && e.nameSet){ t.orig=e.orig; t.nameSet=true; }
      delete mp[k];
    }
  }

  allData=[];
  const entries=Object.values(mp);
  for(const e of entries){
    const reg=extractRegion(e.addr);
    allData.push({orig:e.orig,name:e.orig,isPh:false,addr:e.addr,reg,prods:e.prods,qtys:e.qtys,lat:null,lng:null});
  }
  
  activeReg={do:new Set(), si:new Set(), gu:new Set()};
  buildFilters();
  renderList();
  renderMap();

  // 로딩화면 즉시 닫고 목록 표시 (지도/좌표변환은 지도 ON 시에만)
  hideLoad();
  renderList();
}

// 상세주소(번지/건물번호) 누락 여부 판정
// 정확한 주소로 보려면 다음 중 하나가 있어야 함:
//  - 도로명 + 건물번호  (예: 성남대로 1342, 분당로 50번길 12)
//  - 지번 + 번지        (예: 태평동 7090, 정자동 178-1)
function isImpreciseAddr(addr){
  if(!addr) return true;
  // 괄호 보조표기 제거, '지하149' 같은 지하 건물번호 인식되게 '지하' 제거
  let a=addr.replace(/\([^)]*\)/g,' ').replace(/@/g,' ').replace(/지하/g,' ').trim();
  // 도로명(로/대로/길) + (쉼표/공백) + 건물번호
  const roadBldNo=/(?:[가-힣A-Za-z0-9]+(?:대로|로|길))\s*[,]?\s*\d+(?:-\d+)?/.test(a);
  // 지번주소: 동/리/가(성사2동처럼 숫자 포함 가능) + (쉼표/공백) + 번지
  const jibunNo=/(?:[가-힣]+[0-9]*(?:동|리|가))\s*[,]?\s*\d+(?:-\d+)?/.test(a);
  return !(roadBldNo||jibunNo);
}

async function geocodeOne(addr){
  if(!addr||addr.length<4) return null;
  if(gcache[addr]!==undefined) return gcache[addr];
  if(!(window.naver&&naver.maps&&naver.maps.Service)){ gcache[addr]=null; return null; }
  // 잡음 제거한 주소 우선 시도 → 실패 시 원본 시도
  const cleaned=cleanAddrForGeocode(addr);
  const queries=[];
  if(cleaned && cleaned!==addr) queries.push(cleaned);
  queries.push(addr);
  const tryGeocode=(q)=>new Promise(res=>{
    try{
      naver.maps.Service.geocode({query:q}, (status, response)=>{
        if(status!==naver.maps.Service.Status.OK || !response.v2 || !response.v2.addresses || !response.v2.addresses.length){ res(null); return; }
        const item=response.v2.addresses[0];
        res({lat:parseFloat(item.y), lng:parseFloat(item.x)});
      });
    }catch(e){ res(null); }
  });
  for(const q of queries){
    const loc=await tryGeocode(q);
    if(loc){ gcache[addr]=loc; return loc; }
  }
  gcache[addr]=null; return null;
}



function buildFilters(){
  const pf=document.getElementById('pf');
  if(!pf.children.length){
    PRODS.forEach((p,i)=>{
      const c=document.createElement('button');
      c.className=`chip p${i}`;c.textContent=p.replace('정',''); // 초기 해제 상태
      c.onclick=()=>{c.classList.toggle('on');activeProd.has(p)?activeProd.delete(p):activeProd.add(p);renderAll();};
      pf.appendChild(c);
    });
  }
  
  const doSet=new Set(),siMap={},guMap={};
  for(const d of allData){
    const r=d.reg||{};
    if(r.do) doSet.add(r.do);
    if(r.do&&r.si){if(!siMap[r.do]) siMap[r.do]=new Set(); siMap[r.do].add(r.si);}
    if(r.do&&r.si&&r.gu){const k=r.do+'|'+r.si; if(!guMap[k]) guMap[k]=new Set(); guMap[k].add(r.gu);}
  }
  window._siMap=siMap; window._guMap=guMap;

  const rdo=document.getElementById('rf-do');
  rdo.innerHTML=[...doSet].sort().map(d=>`
    <div class="ritem" onclick="toggleDo(this, '${d}')">
      <input type="checkbox" class="cb-do" value="${d}">
      <span>${d}</span>
    </div>`).join('');
    
  document.getElementById('rf-si').innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">도를 선택하세요</div>';
  document.getElementById('rf-gu').innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">시를 선택하세요</div>';
  updateRegCnt();
}

let _selDo=null,_selSi=null;

function toggleDo(el, d){
  const cb=el.querySelector('input');
  if(_selDo===d){ cb.checked=!cb.checked; } 
  else {
    document.querySelectorAll('#rf-do input').forEach(c=>c.checked=false);
    cb.checked=true; _selDo=d; _selSi=null;
    // 광역시/특별시는 시·군 없이 구 바로 표시
    const isMetro=['서울','부산','대구','인천','광주','대전','울산','세종'].includes(d);
    if(isMetro){
      const siCol=document.getElementById('rf-si');
      const siTitle=document.getElementById('rf-si-title');
      siCol.innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">해당 없음</div>';
      siTitle.textContent='시·군';
      const allGus=new Set();
      for(const dd of allData){ if(dd.reg&&dd.reg.do===d&&dd.reg.gu) allGus.add(dd.reg.gu); }
      const guList=[...allGus].sort();
      document.getElementById('rf-gu').innerHTML=guList.length?guList.map(g=>`
        <div class="ritem" onclick="toggleGu(this)">
          <input type="checkbox" value="${g}">
          <span>${g}</span>
        </div>`).join(''):'<div style="color:var(--text2);font-size:11px;padding:4px">구 정보 없음</div>';
    } else {
      renderSiCol(d);
      document.getElementById('rf-gu').innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">시를 선택하세요</div>';
    }
  }
  if(!cb.checked){ _selDo=null; }
  updateActiveReg();
}

function renderSiCol(d){
  const sis=(window._siMap[d]?[...window._siMap[d]]:[]).sort();
  document.getElementById('rf-si').innerHTML=sis.map(s=>`
    <div class="ritem" onclick="toggleSi(this, '${d}', '${s}')">
      <input type="checkbox" value="${s}">
      <span>${s}</span>
    </div>`).join('');
}

function toggleSi(el, d, s){
  const cb=el.querySelector('input');
  if(_selSi===s){cb.checked=!cb.checked;}
  else{
    document.querySelectorAll('#rf-si input').forEach(c=>c.checked=false);
    cb.checked=true; _selSi=s;
    renderGuCol(d,s);
  }
  if(!cb.checked) _selSi=null;
  updateActiveReg();
}

function renderGuCol(d,s){
  const k=d+'|'+s;
  const gus=(window._guMap[k]?[...window._guMap[k]]:[]).sort();
  if(!gus.length){document.getElementById('rf-gu').innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">구 정보 없음</div>';return;}
  document.getElementById('rf-gu').innerHTML=gus.map(g=>`
    <div class="ritem" onclick="toggleGu(this)">
      <input type="checkbox" value="${g}">
      <span>${g}</span>
    </div>`).join('');
}

function toggleGu(el){
  const cb=el.querySelector('input');
  cb.checked=!cb.checked; updateActiveReg();
}

function updateActiveReg(){
  activeReg.do = new Set([...document.querySelectorAll('#rf-do input:checked')].map(c=>c.value));
  activeReg.si = new Set([...document.querySelectorAll('#rf-si input:checked')].map(c=>c.value));
  activeReg.gu = new Set([...document.querySelectorAll('#rf-gu input:checked')].map(c=>c.value));
  // 광역시 선택 시 si 필터는 의미 없으므로 제거
  const _metros=['서울','부산','대구','인천','광주','대전','울산','세종'];
  if(_selDo&&_metros.includes(_selDo)) activeReg.si = new Set();
  updateRegCnt(); renderAll();
}

function updateRegCnt(){
  const n = activeReg.do.size + activeReg.si.size + activeReg.gu.size;
  document.getElementById('reg-cnt').textContent=n;
  document.getElementById('reg-cnt').style.background=n>0?'var(--accent)':'var(--border)';
}

function selAll(){
  document.querySelectorAll('#rf-do input').forEach(c=>c.checked=true);
  document.getElementById('rf-si').innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">도를 선택하세요</div>';
  document.getElementById('rf-gu').innerHTML='<div style="color:var(--text2);font-size:11px;padding:4px">시를 선택하세요</div>';

// 논리 오류 완전히 수정: "가장 하위 지역" 체크 우선 필터
function getFiltered(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  return allData.filter(d=>{
    const r=activeReg;
    if(r.do.size>0 || r.si.size>0 || r.gu.size>0){
      const dr=d.reg||{};
      let pass=false;
      if(r.gu.size>0){
        // 구 필터: 서울이면 do+gu, 경기면 do+si+gu
        if(dr.gu && r.gu.has(dr.gu)){
          const metros=['서울','부산','대구','인천','광주','대전','울산','세종'];
          if(_selDo&&metros.includes(_selDo)) pass=(dr.do===_selDo);
          else pass=true;
        }
      } else if(r.si.size>0){
        if(dr.si && r.si.has(dr.si)) pass=true;
      } else if(r.do.size>0){
        if(dr.do && r.do.has(dr.do)) pass=true;
      }
      if(!pass) return false;
    }
    if(!PRODS.some(p=>d.prods[p]&&activeProd.has(p))) return false;
    if(q&&!d.name.toLowerCase().includes(q)&&!d.addr.toLowerCase().includes(q)) return false;
    return true;
  });
}

// 정렬 상태: null=기본, 'desc'=내림차순, 'asc'=오름차순
let sortMode=null;

function toggleSort(){
  if(sortMode===null) sortMode='desc';
  else if(sortMode==='desc') sortMode='asc';
  else sortMode=null;
  const btn=document.getElementById('sort-btn');
  btn.textContent = sortMode==='desc'?'금액↓' : sortMode==='asc'?'금액↑' : '금액↕';
  btn.classList.toggle('on', sortMode!==null);
  renderList();
}

function renderList(){
  if(newMode) return; // 신규 개원 모드에선 신규 목록을 유지
  let data=getFiltered();
  const el=document.getElementById('pl');
  document.getElementById('lcnt').textContent=`거래처 ${data.length}곳`;
  if(!data.length){
    el.innerHTML='<div class="empty"><div class="eico">🔍</div><div>조건에 맞는 거래처 없음</div></div>';
    return;
  }
  // 금액 정렬
  if(sortMode){
    data=[...data].sort((a,b)=>{
      const ta=PRODS.filter(p=>activeProd.has(p)).reduce((s,p)=>s+(a.prods[p]||0),0);
      const tb=PRODS.filter(p=>activeProd.has(p)).reduce((s,p)=>s+(b.prods[p]||0),0);
      return sortMode==='desc'?tb-ta:ta-tb;
    });
  }
  el.innerHTML=data.map((d,i)=>{
    const aps=PRODS.filter(p=>d.prods[p]&&activeProd.has(p));
    const total=aps.reduce((s,p)=>s+(d.prods[p]||0),0);
    const tags=aps.map(p=>`<span class="ptag t${PRODS.indexOf(p)}">${p.replace('정','')}</span>`).join('');
    const nm=d.name;
    // allData 인덱스를 직접 사용해서 정렬과 무관하게 정확히 찾음
    const ai=allData.indexOf(d);
    const impWarn=isImpreciseAddr(d.addr)?'<span style="color:var(--red);font-size:10px;flex-shrink:0">⚠번지없음</span>':'';
    // 약국 캐시가 있으면 주소 대신 약국명 표시
    const pharmLabel=pharmCache[ai]!==undefined ? pharmCache[ai] : null;
    const addrLine = pharmLabel!==null
      ? `<span class="pa-pharm">${pharmLabel}</span>`
      : `<span class="pa-addr">${d.addr||'-'}</span>${impWarn}`;
    return `<div class="pi" onclick="focusItem(${ai})" data-i="${i}">
      <div class="pn">${nm}</div>
      <div class="pa">${addrLine}</div>
      <div class="ptags">${tags}</div>
      <div class="pt">${fmtA(total)}${d.gu?` · ${d.gu}`:''}</div>
    </div>`;
  }).join('');
}

async function focusItem(ai){
  const d=allData[ai];
  if(!d) return;
  document.querySelectorAll('.pi').forEach(el=>el.classList.remove('sel'));
  // 클릭한 항목 선택 표시 (allData 인덱스 기준)
  document.querySelectorAll('.pi').forEach(el=>{
    if(parseInt(el.getAttribute('onclick').match(/\d+/)?.[0])===ai) el.classList.add('sel');
  });

  // 좌표 없으면 먼저 변환 후 팝업 열기
  if(!d.lat && d.addr){
    const loc=await geocodeOne(d.addr);
    if(loc){ d.lat=loc.lat; d.lng=loc.lng; }
  }

  // 팝업 (좌표 변환 완료 후 열어야 병원 검색 동작)
  showPopup(d);

  // 약국 검색 → 사이드바 카드 주소줄 업데이트
  if(d.lat && d.lng && pharmCache[ai]===undefined){
    pharmCache[ai]=null; // 검색 중 중복 호출 방지
    fetchClinics(d.lat, d.lng, d.addr).then(({pharm})=>{
      if(pharm.length){
        const first=pharm[0].name;
        pharmCache[ai]=pharm.length>1 ? `💊 ${first} 외 ${pharm.length-1}` : `💊 ${first}`;
      } else {
        pharmCache[ai]=null; // 없으면 주소로 복원
      }
      // 해당 카드만 주소줄 갱신
      const cardEl=document.querySelector(`.pi[onclick="focusItem(${ai})"] .pa`);
      if(cardEl){
        if(pharmCache[ai]!==null){
          cardEl.innerHTML=`<span class="pa-pharm">${pharmCache[ai]}</span>`;
        } else {
          const impWarn=isImpreciseAddr(d.addr)?'<span style="color:var(--red);font-size:10px;flex-shrink:0">⚠번지없음</span>':'';
          cardEl.innerHTML=`<span class="pa-addr">${d.addr||'-'}</span>${impWarn}`;
        }
      }
    });
  }

  // 지도 마커 표시
  if(gmap && d.lat && d.lng){
    markers.forEach(m=>m.setMap(null)); markers=[];
    const aps=PRODS.filter(p=>d.prods[p]&&activeProd.has(p));
    const color=aps.length===1?PC[PRODS.indexOf(aps[0])]:'#ffffff';
    const pos=new naver.maps.LatLng(d.lat,d.lng);
    const mk=new naver.maps.Marker({
      position:pos, map:gmap, title:d.name,
      icon:{
        content:`<div style="width:22px;height:22px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);transform:translate(-11px,-11px)"></div>`,
        anchor:new naver.maps.Point(0,0)
      }
    });
    naver.maps.Event.addListener(mk,'click',()=>showPopup(d));
    markers.push(mk);
    gmap.panTo(pos);
    gmap.setZoom(17);
  }
}

async function showPopup(d){
  document.getElementById('pp-n').textContent=d.name;
  document.getElementById('pp-o').textContent='';
  
  const _imp=isImpreciseAddr(d.addr);
  document.getElementById('pp-a').innerHTML=(d.addr||'-')+
    (_imp?' <span style="color:var(--red);font-weight:600">⚠ 상세주소 없음(번지 누락) — 위치 부정확할 수 있음</span>':'');

  const aps=PRODS.filter(p=>d.prods[p]&&activeProd.has(p));
  document.getElementById('pp-p').innerHTML=aps.map(p=>`
    <div class="prow">
      <span class="ppn" style="color:${PC[PRODS.indexOf(p)]}">${p}</span>
      <span class="pamt">${fmtA(d.prods[p]||0)} <span class="pqty">(${Math.round(d.qtys[p]||0).toLocaleString()}정)</span></span>
    </div>`).join('')||'<div style="color:var(--text2);font-size:12px">데이터 없음</div>';
  
  document.getElementById('popup').classList.add('show');

  const bldSec=document.getElementById('bld-section');
  if(d.lat&&d.lng){
    bldSec.style.display='block';
    document.getElementById('pp-same').innerHTML='<div class="cli-empty">🔍 검색 중...</div>';
    document.getElementById('pp-near').innerHTML='<div class="cli-empty">🔍 검색 중...</div>';
    switchTab('same');
    document.getElementById('pp-pharm').innerHTML='<div class="cli-empty">🔍 검색 중...</div>';
    const result=await fetchClinics(d.lat,d.lng,d.addr);
    const {same,pharm,near}=result;
    // 진단: 같은건물 약국이 없을 때, 카카오가 실제로 돌려준 약국 목록을 보여줌
    let diag='';
    if(result._err){
      diag=`<div class="cli-empty" style="color:var(--red);font-size:11px">⚠ 카카오 검색 오류: ${result._err}<br>(카카오 콘솔에 현재 사이트 도메인 등록 필요)</div>`;
    } else if(!pharm.length){
      const myKey=`${result._myRoad||'?'} ${result._myBno||'?'}`;
      const list=(result._pharmList||[]).map(p=>`<div style="font-size:10px;color:var(--text2);padding:1px 0">· ${p.name} <span style="opacity:.7">[${p.addr||'주소없음'}] ${p.dist}m</span></div>`).join('');
      diag=`<details style="margin-top:6px"><summary style="font-size:11px;color:var(--text2);cursor:pointer">🔍 검색된 약국 ${result._rawPharm}곳 보기 (내 건물키: ${myKey})</summary>${list||'<div style="font-size:10px;color:var(--text2)">검색 결과 없음</div>'}</details>`;
    }
    document.getElementById('pp-same').innerHTML=same.length
      ?same.map(c=>cliHtml(c,true,false)).join('')
      :'<div class="cli-empty">같은 건물 의원 없음</div>';
    // 약국: 해당 주소(같은 건물)에 있을 때만 표시
    if(pharm.length){
      document.getElementById('pp-pharm').innerHTML=pharm.map(c=>pharmHtml(c)).join('');
    } else {
      document.getElementById('pp-pharm').innerHTML='<div class="cli-empty">좌표 데이터 없음</div>';
    }
    document.getElementById('pp-near').innerHTML=near.length
      ?near.map(c=>cliHtml(c,false,true)).join('')
      :'<div class="cli-empty">근처 의원 없음</div>';
  } else {
    bldSec.style.display='none';
  }
}

function pharmHtml(c){
  return `<div class="cli">
    <span class="cli-name">${c.name}<span class="cli-type">약국</span></span>
  </div>`;
}

function cliHtml(c,isSame,showDist){
  const badge=isSame?'<span class="same-badge">같은건물</span>':'';
  const dist=showDist?`<span class="cli-dist">${c.dist}m</span>`:'';
  return `<div class="cli">
    <span class="cli-name">${c.name}${badge}<span class="cli-type">${c.type}</span></span>
    ${dist}
  </div>`;
}

function switchTab(tab){
  const s=document.getElementById('pp-same');
  const p=document.getElementById('pp-pharm');
  const n=document.getElementById('pp-near');
  [s,p,n].forEach(el=>el.style.display='none');
  ['tab-same','tab-pharm','tab-near'].forEach(id=>document.getElementById(id).classList.remove('on'));
  if(tab==='same'){s.style.display='block';document.getElementById('tab-same').classList.add('on');}
  else if(tab==='pharm'){p.style.display='block';document.getElementById('tab-pharm').classList.add('on');}
  else{n.style.display='block';document.getElementById('tab-near').classList.add('on');}
}

// 카카오 로컬 REST API로 주변 의원/약국 탐색
async function fetchClinics(lat,lng,addr){
  // 내 주소의 도로명 + 건물번호 추출 (같은 건물 판정용)
  // ※ 도로명에 'NN길/NN가길/NN번길'이 붙을 수 있고, 그 "뒤" 숫자가 건물번호.
  //   예) 산성대로372번길 14 → road=산성대로372번길, bno=14
  //       두류공원로17길 16   → road=두류공원로17길,   bno=16
  //       분당로 50          → road=분당로,          bno=50
  function extractRoadAndBno(a){
    if(!a) return {road:null, bno:null};
    // 괄호/@제거 후 공백까지 모두 제거 → 띄어쓰기 차이 무력화
    const s=a.replace(/\([^)]*\)/g,' ').replace(/@/g,' ').replace(/\s+/g,'');
    // '…로/대로' + (NN길)? + 건물번호 패턴을 끝까지 훑어 마지막 매치 채택
    const re=/([가-힣]+?(?:대로|로))(\d+(?:가|번)?길)?(\d+(?:-\d+)?)/g;
    let best=null, mm;
    while((mm=re.exec(s))){
      let road=mm[1];
      // 행정구역 경계에서 잘라 순수 도로명만 남김.
      // '시'는 도로명(시민로 등)에 흔히 쓰여 단독으로는 자르지 않고,
      // 구/군/읍/면/동/리 또는 'OO시' 뒤에 구/군이 이어질 때만 제거.
      road=road.replace(/^.*(?:광역시|특별시|특별자치시|[가-힣]+시(?=[가-힣]+[구군])|[가-힣]+[구군]|[가-힣]+[읍면동리])(?=[가-힣])/,'');
      best={road:road+(mm[2]||''), bno:mm[3]};
    }
    return best||{road:null, bno:null};
  }
  const {road:myRoad, bno:myBno}=extractRoadAndBno(addr);

  // 카카오 API 진단용 (마지막 에러 기록)
  let _kakaoErr=null;

  // 카카오 로컬 키워드 검색 헬퍼 (pages: 가져올 페이지 수, 페이지당 15개)
  async function kakaoSearch(kw, radius=200, pages=1){
    const all=[];
    for(let p=1;p<=pages;p++){
      try{
        const res=await fetch(
          `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(kw)}&x=${lng}&y=${lat}&radius=${radius}&sort=distance&size=15&page=${p}`,
          {headers:{'Authorization':`KakaoAK ${KAKAO_REST}`}}
        );
        if(!res.ok){ _kakaoErr=`HTTP ${res.status} (${kw})`; break; }
        const d=await res.json();
        if(d.errorType||d.code){ _kakaoErr=`${d.errorType||d.code}: ${d.message||''}`; break; }
        if(d.documents) all.push(...d.documents);
        if(!d.documents||d.documents.length<15||(d.meta&&d.meta.is_end)) break;
      }catch(e){ _kakaoErr='네트워크/CORS 오류: '+e.message; break; }
    }
    return all;
  }

  // 주소 기반 검색 (좌표 오차 무관) — 같은 건물 약국 누락 방지용
  async function kakaoSearchByAddr(query, size=15){
    try{
      const res=await fetch(
        `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(query)}&size=${size}`,
        {headers:{'Authorization':`KakaoAK ${KAKAO_REST}`}}
      );
      if(!res.ok){ _kakaoErr=`HTTP ${res.status} (addr)`; }
      const d=await res.json();
      if(d.errorType||d.code){ _kakaoErr=`${d.errorType||d.code}: ${d.message||''}`; }
      return d.documents||[];
    }catch(e){ _kakaoErr='네트워크/CORS 오류: '+e.message; return []; }
  }

  // 지번주소(동/리/가 + 번지) 추출 — 도로명이 없을 때 보조 매칭용
  // 공백을 유지해 동(洞) 이름이 앞의 시/군/구와 붙어 깎이지 않게 함 (예: 구로동→로동 방지)
  function extractJibun(a){
    if(!a) return null;
    const s=a.replace(/\([^)]*\)/g,' ').replace(/@/g,' ').replace(/\s+/g,' ').trim();
    // 문자열 시작 또는 공백 뒤의 '○○동/리/가' 토큰 + 번지
    const m=s.match(/(?:^|\s)([가-힣]+(?:동|리|가))\s*(\d+(?:-\d+)?)/);
    return m?(m[1]+m[2]):null;
  }
  const myJibun=extractJibun(addr);

  // 같은 건물 판정
  // 1) 도로명+건물번호가 같으면 → 거리와 무관하게 같은 건물 (좌표 오차 방지)
  // 2) 지번(동+번지)이 같아도 같은 건물
  // 3) 위 정보가 없으면 거리 25m 이내로 fallback
  function sameBuilding(dist, r){
    const raddrRoad=r.road_address_name||'';
    const raddrJibun=r.address_name||'';
    if(myRoad && myBno){
      const {road:rRoad, bno:rBno}=extractRoadAndBno(raddrRoad||raddrJibun);
      if(rRoad && rBno && rRoad===myRoad && rBno===myBno) return true;
    }
    if(myJibun){
      const rJibun=extractJibun(raddrJibun||raddrRoad);
      if(rJibun && rJibun===myJibun) return true;
    }
    // 주소 매칭이 안 될 때만 거리로 판정 (좁게)
    return dist<=25;
  }

  // 카카오 카테고리 검색 (PM9=약국, HP8=병원) — 키워드검색보다 누락이 적음
  async function kakaoCategory(code, radius=500, pages=3){
    const all=[];
    for(let p=1;p<=pages;p++){
      try{
        const res=await fetch(
          `https://dapi.kakao.com/v2/local/search/category.json?category_group_code=${code}&x=${lng}&y=${lat}&radius=${radius}&sort=distance&size=15&page=${p}`,
          {headers:{'Authorization':`KakaoAK ${KAKAO_REST}`}}
        );
        if(!res.ok){ _kakaoErr=`HTTP ${res.status} (cat ${code})`; break; }
        const d=await res.json();
        if(d.errorType||d.code){ _kakaoErr=`${d.errorType||d.code}: ${d.message||''}`; break; }
        if(d.documents) all.push(...d.documents);
        if(!d.documents||d.documents.length<15||(d.meta&&d.meta.is_end)) break;
      }catch(e){ _kakaoErr='네트워크/CORS 오류: '+e.message; break; }
    }
    return all;
  }

  // 의원/병원 + 약국 병렬 검색
  const cleanAddr=(addr||'').replace(/\([^)]*\)/g,' ').replace(/@/g,' ').replace(/\s+/g,' ').trim();
  // 도로명+건물번호까지만 자른 주소 (예: 경기 성남시 수정구 수정로 141-1)
  const roadAddrOnly=(()=>{
    const m=cleanAddr.match(/^(.*?(?:대로|로)(?:\s*\d+(?:가|번)?길)?\s*\d+(?:-\d+)?)/);
    return m?m[1].trim():cleanAddr;
  })();
  // 지번주소 추출 (시군구 + 동 + 번지) — 카카오가 지번으로만 등록한 약국 매칭용
  // 괄호 안(예: (태평동))도 살펴봄
  const jibunAddrQuery=(()=>{
    const sgg=(addr||'').match(/([가-힣]+[시군](?:\s+[가-힣]+구)?)/);
    const full=(addr||'').replace(/@/g,' ');
    const dong=full.match(/([가-힣]+[0-9]*(?:동|리|가))\s*[,]?\s*(\d+(?:-\d+)?)/);
    if(dong) return ((sgg?sgg[1]+' ':'')+dong[1]+' '+dong[2]).trim();
    return null;
  })();
  const [clinics1, clinics2, pharmsCat50, pharmsCatWide, pharmsByAddr1, pharmsByAddr2, pharmsByAddr3]=await Promise.all([
    kakaoCategory('HP8', 300, 2),               // 병원/의원 카테고리
    kakaoSearch('의원', 250, 1),
    kakaoCategory('PM9', 50, 1),                 // 약국 반경 50m (주 표시용)
    kakaoCategory('PM9', 500, 3),                // 약국 반경 500m (주변약국 fallback 풀)
    cleanAddr ? kakaoSearchByAddr(roadAddrOnly+' 약국', 15) : Promise.resolve([]),
    roadAddrOnly!==cleanAddr ? kakaoSearchByAddr(cleanAddr, 15) : Promise.resolve([]),
    jibunAddrQuery ? kakaoSearchByAddr(jibunAddrQuery+' 약국', 15) : Promise.resolve([]),
  ]);
  // 주소검색으로 나온 약국(좌표 무관, 같은건물 후보)
  const addrPharms=[...pharmsByAddr1, ...pharmsByAddr2, ...pharmsByAddr3].filter(r=>r&&(r.category_group_code==='PM9'||/약국/.test(r.place_name||'')));
  // 반경 50m 약국
  const pharmMap=new Map();
  [...pharmsCat50].forEach(r=>{ if(r&&r.id) pharmMap.set(r.id,r); });
  const pharms50=[...pharmMap.values()];
  // 주변 fallback 풀 (500m)
  const widePharmMap=new Map();
  [...pharmsCatWide].forEach(r=>{ if(r&&r.id) widePharmMap.set(r.id,r); });
  const pharmsWide=[...widePharmMap.values()];

  // 의원 중복 제거 (HP8 카테고리 + 의원 키워드)
  const clinicMap=new Map();
  [...clinics1,...clinics2].forEach(r=>{ if(r&&r.id) clinicMap.set(r.id,r); });

  // === [의원 전용] 같은 건물 판정 — 이전 버전 로직 복원 (해당 주소 의원 정확도 ↑) ===
  // 약국 쪽 sameBuilding/extractRoadAndBno와 분리. 의원에는 이 함수만 사용.
  function extractRoadAndBnoC(a){
    if(!a) return {road:null, bno:null};
    const s=a.replace(/\([^)]*\)/g,' ').replace(/@/g,' ');
    const m=s.match(/((?:[가-힣A-Za-z0-9]+)(?:대로|로))(?:\s*(\d+(?:가|번)?길))?\s*[, ]?\s*(\d+(?:-\d+)?)/);
    if(m){
      const road=(m[1]+(m[2]||'')).replace(/\s/g,'');
      return {road, bno:m[3]};
    }
    return {road:null, bno:null};
  }
  const {road:myRoadC, bno:myBnoC}=extractRoadAndBnoC(addr);
  function sameBuildingC(dist, raddr){
    if(dist<=25) return true;
    if(dist<=60 && myRoadC && myBnoC){
      const {road:rRoad, bno:rBno}=extractRoadAndBnoC(raddr);
      if(rRoad && rBno && rRoad===myRoadC && rBno===myBnoC) return true;
    }
    return false;
  }

  const same=[],pharm=[],near=[];

  // 의원/병원 분류
  for(const r of clinicMap.values()){
    const rlat=parseFloat(r.y), rlng=parseFloat(r.x);
    const dist=getDist(lat,lng,rlat,rlng);
    const raddr=r.road_address_name||r.address_name||'';
    const isSame=sameBuildingC(dist, raddr);

    const nm=r.place_name;
    // 치과·한의원은 제외 (요청사항)
    if(nm.includes('치과')||nm.includes('한의원')||nm.includes('한방')) continue;

    let type='의원';
    if(nm.includes('내과')) type='내과';
    else if(nm.includes('이비인후과')) type='이비인후과';
    else if(nm.includes('가정의학과')||nm.includes('가정의')) type='가정의학과';
    else if(nm.includes('정형외과')) type='정형외과';
    else if(nm.includes('피부과')) type='피부과';
    else if(nm.includes('안과')) type='안과';
    else if(nm.includes('병원')) type='병원';

    if(isSame) same.push({name:nm,type,dist:Math.round(dist)});
    else if(dist<=100) near.push({name:nm,type,dist:Math.round(dist)});
  }

  // === 약국: 해당 주소(같은 건물)에 있는 약국만 표시 ===
  const _allPharmDbg=[];
  const pharmSeen=new Set();
  function addPharm(r){
    const nm=r.place_name;
    if(pharmSeen.has(nm)) return;
    pharmSeen.add(nm);
    pharm.push({name:nm, type:'약국'});
  }

  // 1) 반경 50m 약국 중 같은 건물(해당 주소)인 약국만
  for(const r of pharms50){
    const dist=getDist(lat,lng,parseFloat(r.y),parseFloat(r.x));
    _allPharmDbg.push({name:r.place_name, addr:r.road_address_name||r.address_name||'', dist:Math.round(dist)});
    if(dist<=50 && sameBuilding(dist,r)) addPharm(r);
  }
  // 2) 주소로 매칭된 약국 (좌표 오차로 50m에서 빠진 같은 건물)
  for(const r of addrPharms){
    if(sameBuilding(99999, r)){ // 거리 무시, 주소만으로 판정
      addPharm(r);
    }
  }
  // 3) 500m 풀에서 도로명+번지(또는 지번)가 정확히 일치하는 약국 (좌표가 50m 넘게 어긋난 경우 복구)
  //    거리로 넣는 게 아니라 같은 건물 주소일 때만 → 오탐 없음.
  const _dbgSeen=new Set(_allPharmDbg.map(p=>p.name));
  for(const r of pharmsWide){
    const dist=getDist(lat,lng,parseFloat(r.y),parseFloat(r.x));
    if(!_dbgSeen.has(r.place_name)){ _dbgSeen.add(r.place_name); _allPharmDbg.push({name:r.place_name, addr:r.road_address_name||r.address_name||'', dist:Math.round(dist)}); }
    if(sameBuilding(dist, r)) addPharm(r);
  }
  // (주변 약국 fallback 제거 — 해당 주소에 약국이 있을 때만 표시)
  const pharmFallback=false;
  _allPharmDbg.sort((a,b)=>a.dist-b.dist);

  same.sort((a,b)=>a.dist-b.dist);
  near.sort((a,b)=>a.dist-b.dist);
  return {same:same.slice(0,15), pharm:pharm.slice(0,5), near:near.slice(0,15),
          _err:_kakaoErr, _rawPharm:(pharms50.length+pharmsWide.length), _rawClinic:clinicMap.size,
          _myRoad:myRoad, _myBno:myBno, _pharmFallback:pharmFallback, _pharmList:_allPharmDbg.slice(0,12)};
}

function getDist(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  return R*2*Math.atan2(Math.sqrt(Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2),Math.sqrt(1-(Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2)));
}

function fmtA(n){
  if(!n||isNaN(n))return'-';
  if(n>=100000000)return(n/100000000).toFixed(1)+'억';
  if(n>=10000)return Math.round(n/10000)+'만원';
  return n.toLocaleString()+'원';
}

// CP949(euc-kr) 우선 디코드, 안되면 utf-8
function decodeKR(buf){
  const bytes=new Uint8Array(buf);
  try{ return new TextDecoder('utf-8',{fatal:true}).decode(bytes); }catch(e){}
  try{ return new TextDecoder('euc-kr').decode(bytes); }catch(e){}
  return new TextDecoder().decode(bytes);
}
function isHiraCsv(text){
  const head=(text.split(/\r?\n/,1)[0]||'');
  return head.includes('요양종별') && head.includes('개설일자') && head.includes('도로명주소');
}
// 따옴표 처리하는 경량 CSV 파서 (대용량 대응)
function parseCsvRows(text){
  const rows=[]; let row=[], field='', inQ=false; const n=text.length;
  for(let i=0;i<n;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===',') { row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c!=='\r') field+=c;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function parseHiraCsv(text){
  const arr=parseCsvRows(text);
  if(!arr.length) return;
  const H=arr[0].map(h=>String(h).replace(/\s+/g,''));
  const ci=k=>H.findIndex(h=>h.includes(k));
  const iName=ci('요양기관명'), iKind=ci('요양종별'), iAddr=ci('도로명주소'),
        iDept=ci('표시과목'), iDate=ci('개설일자'), iSido=ci('시도명'),
        iLat=ci('lat'), iLng=ci('lng');
  const out=[];
  for(let r=1;r<arr.length;r++){
    const row=arr[r]; if(!row||row.length<3) continue;
    const addr=String(row[iAddr]||'').trim();
    const date=String(row[iDate]||'').trim();
    if(!addr||!date) continue;
    out.push({
      name:String(row[iName]||'').trim(),
      kind:String(row[iKind]||'').trim(),
      addr, dept:iDept>=0?String(row[iDept]||'').trim():'',
      date:date.replace(/[.\/]/g,'-'),
      ymd:date.replace(/\D/g,''),
      시도명:iSido>=0?String(row[iSido]||'').trim():'',
      reg:null,
      lat: iLat>=0 && row[iLat] ? parseFloat(row[iLat])||null : null,
      lng: iLng>=0 && row[iLng] ? parseFloat(row[iLng])||null : null,
    });
  }
  newClinics=out;
}

function fmtYmd(y){ return (y&&y.length>=8)?`${y.slice(0,4)}-${y.slice(4,6)}-${y.slice(6,8)}`:'-'; }
function newMaxDate(){ let m='00000000'; for(const c of newClinics){ if(c.ymd>m) m=c.ymd; } return m; }
function cutoffYmd(maxY, months){
  if(!maxY||maxY.length<8) return '00000000';
  const dt=new Date(+maxY.slice(0,4), +maxY.slice(4,6)-1, +maxY.slice(6,8));
  dt.setMonth(dt.getMonth()-months);
  const p=x=>String(x).padStart(2,'0');
  return `${dt.getFullYear()}${p(dt.getMonth()+1)}${p(dt.getDate())}`;
}
// 기존 지역필터(activeReg)를 신규 개원에도 동일 적용
function regionMatch(dr){
  const r=activeReg;
  if(!(r.do.size||r.si.size||r.gu.size)) return true;
  const metros=['서울','부산','대구','인천','광주','대전','울산','세종'];
  if(r.gu.size>0){
    if(dr.gu && r.gu.has(dr.gu)){
      if(_selDo&&metros.includes(_selDo)) return dr.do===_selDo;
      return true;
    }
    return false;
  } else if(r.si.size>0){
    return !!(dr.si && r.si.has(dr.si));
  } else if(r.do.size>0){
    return !!(dr.do && r.do.has(dr.do));
  }
  return false;
}

function filteredNew(){
  if(!newClinics.length) return [];
  const cut=cutoffYmd(newMaxDate(), newMonths);
  const q=(document.getElementById('srch').value||'').trim().toLowerCase();

  for(const c of newClinics){
    if(!newKinds.has(c.kind)) continue;
    if(c.ymd<cut) continue;
    if(newSelSido && (c.시도명||'')!==newSelSido) continue;
    if(newSelSigu && !c.addr.includes(newSelSigu)) continue;
    if(q && !c.name.toLowerCase().includes(q)) continue;
    res.push(c);
  }
  res.sort((a,b)=>b.ymd.localeCompare(a.ymd));
  return res;

// ===================== 깃헙 자동 불러오기 (신규 개원 데이터) =====================
// ── IndexedDB 캐시 (new-clinics CSV) ──────────────────────────
const IDB_NAME='ncCache', IDB_STORE='data', IDB_KEY='csv', IDB_COORD='coords';
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function idbPut(key, val){
  try{
    const db=await idbOpen();
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
  }catch(e){ console.warn('IDB put 실패',e); }
}
async function idbGet(key){
  try{
    const db=await idbOpen();
    return await new Promise((res,rej)=>{
      const r=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
      r.onsuccess=e=>res(e.target.result||null);
      r.onerror=e=>rej(e.target.error);
    });
  }catch(e){ return null; }
}
// 좌표가 채워진 항목을 IDB에 저장 (필터 바꿔도 재변환 안 하게)
async function saveCoords(){
  const map={};
  for(const c of newClinics){ if(c.lat&&c.lng) map[c.addr]={lat:c.lat,lng:c.lng}; }
  if(Object.keys(map).length) await idbPut(IDB_COORD, map);
}
// 저장된 좌표를 newClinics에 복원
async function restoreCoords(){
  const map=await idbGet(IDB_COORD);
  if(!map) return;
  for(const c of newClinics){
    if(!c.lat && map[c.addr]){ c.lat=map[c.addr].lat; c.lng=map[c.addr].lng; }
  }
}

  try{
    // ETag로 변경 여부 확인 — 안 바뀌었으면 캐시 그대로 사용
    const prevEtag = (() => { try{ return localStorage.getItem('ncEtag')||''; }catch(e){ return ''; } })();
    const headers = {'cache-control':'no-cache'};
    if(!force && prevEtag) headers['If-None-Match'] = prevEtag;
    const res = await fetch(url, {headers});
    if(res.status === 304){
      // 변경 없음 — 캐시 그대로
      return;
    }
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    if(!isHiraCsv(text)) return;
    const etag = res.headers.get('etag')||'';
    try{ if(etag) localStorage.setItem('ncEtag', etag); }catch(e){}
    parseHiraCsv(text);
    await idbPut(IDB_KEY, {text, ts:Date.now()});
    await restoreCoords();
    onHiraLoaded();
  }catch(e){
    console.warn('개원 데이터 로드 실패:', e.message);
  }
}
// 열 때 자동으로 최신 데이터 확인 (캐시 먼저 복원 → 백그라운드에서 변경 확인)
window.addEventListener('load', async ()=>{
  // 1) 캐시 즉시 복원
  try{
    const cached=await idbGet(IDB_KEY);
    if(cached && isHiraCsv(cached.text)){
      parseHiraCsv(cached.text);
      await restoreCoords();
      onHiraLoaded();
    }
  }catch(e){}
  // 2) 백그라운드에서 최신 데이터 확인 (변경된 경우에만 업데이트)
  setTimeout(()=>loadFromGithub(false), 1000);
});

name: 신규 개원 데이터 갱신
 
on:
  schedule:
    - cron: "0 21 * * 0"   # 매주 일요일 21:00 UTC (= 월요일 06:00 한국시간)
  workflow_dispatch: {}     # "Run workflow" 버튼으로 수동 실행도 가능
 
permissions:
  contents: write
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
 
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
 
      - name: 개폐업 데이터 수집 + 좌표 변환
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          KAKAO_REST:  ${{ secrets.KAKAO_REST }}
        run: python fetch_openings.py
 
      - name: 변경분 저장(커밋)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add new-clinics.csv
          git commit -m "update new-clinics.csv ($(date -u +%Y-%m-%d))" || echo "변경 없음"
          git push --force
 
